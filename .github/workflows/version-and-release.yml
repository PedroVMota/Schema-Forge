name: Version & Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  version-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
      
      - name: Get latest tag
        id: latest_tag
        run: |
          TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "0.0.0")
          echo "tag=${TAG#v}" >> $GITHUB_OUTPUT
      
      - name: Determine version bump
        id: version
        env:
          LATEST_TAG: ${{ steps.latest_tag.outputs.tag }}
          PR_LABELS: ${{ github.event.pull_request.labels.*.name }}
        run: |
          LATEST="${LATEST_TAG}"
          IFS='.' read -r MAJOR MINOR PATCH <<< "$LATEST"
          
          # Check PR labels for version type
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            if echo "$PR_LABELS" | grep -q "major"; then
              MAJOR=$((MAJOR + 1))
              MINOR=0
              PATCH=0
            elif echo "$PR_LABELS" | grep -q "minor"; then
              MINOR=$((MINOR + 1))
              PATCH=0
            else
              # Default: bump patch version
              PATCH=$((PATCH + 1))
            fi
          else
            # For manual trigger or direct push, bump patch
            PATCH=$((PATCH + 1))
          fi
          
          NEW_VERSION="${MAJOR}.${MINOR}.${PATCH}"
          echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "Tag: v$NEW_VERSION"
      
      - name: Generate changelog
        id: changelog
        env:
          LATEST_TAG: ${{ steps.latest_tag.outputs.tag }}
          VERSION: ${{ steps.version.outputs.version }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Generate changelog from commits
          if [ "$LATEST_TAG" = "0.0.0" ]; then
            COMMITS=$(git log --oneline --pretty=format:"- %h: %s" | head -20)
          else
            COMMITS=$(git log v${LATEST_TAG}..HEAD --oneline --pretty=format:"- %h: %s")
          fi
          
          # Create changelog file
          {
            echo "# Changelog"
            echo ""
            echo "## [v${VERSION}] - $(date +'%Y-%m-%d')"
            echo ""
            echo "### Changes"
            echo "$COMMITS"
            echo ""
          } > CHANGELOG.md
          
          # Save changelog for release body
          CHANGELOG_CONTENT=$(cat CHANGELOG.md)
          echo "changelog_content<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGELOG_CONTENT" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: sql-visualizer:${{ steps.version.outputs.version }}
          build-args: |
            VERSION=${{ steps.version.outputs.version }}
            BUILD_DATE=$(date -u +'%Y-%m-%dT%H:%M:%SZ')
            VCS_REF=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      
      - name: Create version tag
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"
          git tag "v${VERSION}"
          git push origin "v${VERSION}"
      
      - name: Create release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: v${{ steps.version.outputs.version }}
          release_name: Release v${{ steps.version.outputs.version }}
          body: ${{ steps.changelog.outputs.changelog_content }}
          draft: false
          prerelease: false
